spring.application.name=quizapp

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/questiondb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:yourpassword}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:MyVeryLongSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ── App ───────────────────────────────────────────────────────────────────────
server.port=8080

# ── OpenAI (for AI Mentor chatbot + AI insight generation) ────────────────────
# Get your key from https://platform.openai.com/api-keys
# Set as environment variable — never hardcode this
openai.api.key=${OPENAI_API_KEY:your-openai-api-key-here}
openai.model=${OPENAI_MODEL:gpt-3.5-turbo}
openai.max-tokens=${OPENAI_MAX_TOKENS:500}

# ── Gamification ──────────────────────────────────────────────────────────────
app.gamification.xp.quiz-completion=10
app.gamification.xp.correct-answer=2
app.gamification.xp.streak-bonus=5
